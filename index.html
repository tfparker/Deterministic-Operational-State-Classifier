<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Deterministic Operational State Classifier</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="container">
    <h1>Operational State Classifier</h1>

    <div class="chart">
      <p>Sample Metric Behavior (static)</p>
    </div>

    <div class="output">
      <h2>Current State</h2>
      <div id="state">—</div>
      <p class="boundary">
        This is a classification, not a forecast. No causal inference is provided.
      </p>
    </div>

    <button onclick="classify()">Run Classification</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
